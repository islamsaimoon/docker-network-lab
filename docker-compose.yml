version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx_reverse_proxy
    ports:
      - "80:80"
    volumes:
      # Mount the custom configuration into Nginx
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ops_net

  app:
    build: ./app
    container_name: flask_dashboard
    networks:
      - ops_net
    volumes:
      # Persist application data to a named volume
      - app_data:/data

  # A toolbox container with common network utilities such as ping, curl and tcpdump.
  netshoot:
    image: nicolaka/netshoot:latest
    container_name: network_tools
    command: ["sleep", "infinity"]
    networks:
      - ops_net

networks:
  ops_net:
    # Use the default bridge driver. Docker automatically provides name-based service discovery for containers on the same network.
    driver: bridge

volumes:
  app_data:
    # Named volume for the Flask application's persistent storage
    driver: local